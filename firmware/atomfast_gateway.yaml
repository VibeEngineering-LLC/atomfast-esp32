# ║ baseline (esp-idf). Пошаговая инкрементальная сборка по образу Radex     ║
# ║ v0.3.0 (STEP 0 → STEP 5).                                                ║
# ║                                                                          ║
# ║ ИСХОДНЫЙ BASELINE (verbatim upstream):                                   ║
# ║   github.com/esphome/bluetooth-proxies (branch main, 2026-06-14)         ║
# ║   raw: https://raw.githubusercontent.com/esphome/bluetooth-proxies/      ║
# ║        main/esp32-generic/esp32-generic.yaml                             ║
# ║   SHA-1: 6d0be3a17183d5d43fbcffcd793b6f4facf9e14e (678 B, 35 строк)      ║
# ║   Локальная копия в проекте:                                             ║
# ║     firmware/_baseline_btproxy/esp32-generic.yaml                        ║
# ║     firmware/_baseline_btproxy/README.md (URL/SHA/дата клонирования)     ║
# ║                                                                          ║
# ║ Что в baseline (минимум, 35 строк):                                      ║
# ║   esphome + esp32 esp-idf + wifi.ap + api + logger + ota.esphome +       ║
# ║   esp32_ble_tracker(scan active:true) + bluetooth_proxy(active:true) +   ║
# ║   button.safe_mode + button.factory_reset                                ║
# ║                                                                          ║
# ║ Этот файл — расширение baseline под наш контекст: secrets, api.          ║
# ║   encryption, web_server (v3+log:false+auth+sorting_groups), mdns,       ║
# ║   диагностические sensor/text_sensor, WiFi-watchdog, sdkconfig_options.  ║
# ║                                                                          ║
# ║ STEP 0 — clean baseline БЕЗ AtomFast-датчиков:                           ║
# ║   • esp32_ble_tracker + bluetooth_proxy active:true (HA-нативка фон)     ║
# ║   • api.encryption + web_server v3 + log:false + auth + sorting_groups   ║
# ║   • mdns + safe_mode/factory_reset/restart кнопки                        ║
# ║   • uptime + wifi_signal + heap + min_heap + wifi_info                   ║
# ║   • WiFi-watchdog 180s App.safe_reboot (INC-01)                          ║

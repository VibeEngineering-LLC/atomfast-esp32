# ║                                                                          ║
# ║ ⚠ INC-09 override: AtomFast esp-idf был забанен v0.7.0→v0.7.2 (откат на  ║
# ║   arduino — long-reconnect регрессия). Здесь сознательный возврат:       ║
# ║   оператор референсит Radex v0.3.0 (esp-idf-baseline стабилен с нуля).   ║
# ║   Это другой контекст: не миграция существующей arduino-сборки, а свежий ║
# ║   старт от bt-proxy эталона, где BLE-стек esp-idf изначально устойчив.   ║
# ║                                                                          ║

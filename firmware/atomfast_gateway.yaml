# WiFi-watchdog: если WiFi отсутствует >180s — App.safe_reboot().
# Покрывает silent-WiFi-hang (INC-01) на любом фреймворке (ESPHome API кросс-фреймворк).
# 300с-tick: авто-выгрузка на Народмон, если switch ON + WiFi up + intensity не NaN.
# 300с — минимально допустимый интервал Народмона (короче → бан IP на 1 час).
interval:
  - interval: 10s
    then:
      - lambda: |-
          static uint32_t wifi_down_since_ms = 0;
          if (wifi::global_wifi_component->is_connected()) {
            wifi_down_since_ms = 0;
          } else {
            if (wifi_down_since_ms == 0) wifi_down_since_ms = millis();
            uint32_t down_for = millis() - wifi_down_since_ms;
            if (down_for > 180000) {
              ESP_LOGE("watchdog", "WiFi down > 180s, restarting");
              App.safe_reboot();
            }
          }

  - interval: 300s
    then:
      - if:
          condition:
            and:
              - switch.is_on: narodmon_enabled
              - wifi.connected:
              - lambda: "return !std::isnan(id(intensity_uSv_h).state);"
          then:
            - logger.log:
                level: INFO
                format: "Народмон: 300s-tick → авто-выгрузка"
            - script.execute: send_narodmon
          else:
            - lambda: |-
                ESP_LOGD("narodmon", "300s-tick skip: enabled=%d wifi=%d intensity_nan=%d",
                         id(narodmon_enabled).state,
                         wifi::global_wifi_component->is_connected(),
                         std::isnan(id(intensity_uSv_h).state));
# ╔══════════════════════════════════════════════════════════════╗
# ║  secrets.example.yaml — шаблон. Скопируй в secrets.yaml,    ║
# ║  заполни своими значениями. secrets.yaml — в .gitignore!     ║
# ╚══════════════════════════════════════════════════════════════╝

# ── WiFi домашней сети ────────────────────────────────────────
wifi_ssid: "ИмяТвоейСети"
wifi_password: "парольWiFi"

# ── Fallback AP-пароль (v0.8.0+) ──────────────────────────────
# Если плата не подключилась к домашней WiFi — поднимает свою AP
# «AtomFast-BTProxy Fallback» с этим паролем. Минимум 8 символов.
ap_password: "придумайСвойAPпароль"

# ── ESPHome API encryption (для Home Assistant) ───────────────
# Сгенерировать новый ключ (base64, 32 байта):
#   python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
api_encryption_key: "0000000000000000000000000000000000000000000=="

# ── OTA-пароль ─────────────────────────────────────────────────
# Любая строка ≥8 символов. Защищает от случайной перепрошивки
# с чужого устройства в той же сети.
ota_password: "придумайСвойOTAпароль"

# ── Web UI Basic Auth (v0.8.0+) ───────────────────────────────
# С v0.8.0-step4 Web UI закрыт Basic Auth. Две причины:
#   1) безопасность (Web UI на 80 порту в локальной сети);
#   2) INC-10 mitigation — авторизация режет фантомные SSE keepalive
#      на 401 ДО открытия /events (устраняется ENFILE 503 от XRay-proxy
#      на Windows-стороне).
web_username: "придумайИмя"
web_password: "придумайПарольWebUI"

# ── MAC AtomFast ───────────────────────────────────────────────
# Узнать: открой приложение AtomFast → Настройки → информация о приборе.
# Или: BLE-сканер в Web UI ESPHome (для других прошивок) / nRF Connect.
# Формат UPPERCASE с двоеточиями.
atomfast_mac: "AA:BB:CC:DD:EE:FF"

# ═══════════════════════════════════════════════════════════════════════
# v0.9.0-s3 baseline (atomfast_gateway_s3.yaml) — отдельные ключи
# ═══════════════════════════════════════════════════════════════════════
# YAML atomfast_gateway_s3.yaml (esp-idf, ESP32-S3) использует ОТДЕЛЬНЫЕ
# api/ota/web-пароли — чтобы не пересекаться со старой arduino-прошивкой,
# если в твоей сети крутятся обе платы параллельно.
#
# Сгенерировать каждый ключ:
#   python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"   # api_key
#   python -c "import secrets; print(secrets.token_urlsafe(18))"                                    # ota_pass / web_pass

# ESPHome API encryption (для Home Assistant) — base64 32 байта.
atomfast_s3_api_key: "0000000000000000000000000000000000000000000=="

# OTA-пароль для прошивки по воздуху (esphome run --device <ip>).
atomfast_s3_ota_pass: "придумайОтдельныйS3OTAпароль"

# Web UI Basic Auth (username по умолчанию = admin внутри YAML).
atomfast_s3_web_pass: "придумайОтдельныйS3WebПароль"
# ═══════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────
